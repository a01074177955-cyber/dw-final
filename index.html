<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오늘도 참는다</title>
<style>
@font-face{font-family:'neodgm';src:url('data/neodgm_code.woff') format('woff');}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

#game{
  position:absolute;
  width:1920px;height:1080px;
  transform-origin:top left;
  overflow:hidden;
}
#bg{position:absolute;inset:0;background-size:cover;background-position:center;}
#dim-overlay{
  position:absolute;inset:0;background:#000;opacity:0;
  pointer-events:none;z-index:25;transition:opacity .5s ease;
}

/* ── SJ ── */
#sj-wrap{
  position:absolute;left:840px;top:0;
  width:1080px;height:1080px;display:none;z-index:10;
}
#sj-img{width:1080px;height:1080px;object-fit:contain;object-position:bottom;}
#sj-img.slide-in{animation:sj-slide .3s ease forwards;}
@keyframes sj-slide{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
#sj-img.bang-in{animation:sj-bang .25s ease forwards;}
@keyframes sj-bang{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}

/* ── STRGRAPH ── */
#str-graph{
  position:absolute;left:840px;top:200px;
  width:280px;opacity:0;z-index:8;pointer-events:none;
}
#str-graph.sgshow{animation:sg-pop .3s ease forwards;}
@keyframes sg-pop{
  0%{opacity:0;transform:scale(.5) rotate(-10deg);}
  60%{transform:scale(1.1) rotate(2deg);}
  100%{opacity:1;transform:scale(1) rotate(0);}
}

/* ── STATUS ── */
#status{
  position:absolute;left:0;top:0;z-index:20;display:none;
  padding:60px;
  background:url('data/status.png') no-repeat top left;
}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.stat-row img{width:80px;height:80px;image-rendering:pixelated;object-fit:contain;}
.stat-val{
  font-family:'neodgm',monospace;font-size:60px;color:#fff;
  text-shadow:3px 3px 0 #000,-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000;
  min-width:60px;
}

/* ── CHAT BOX ── */
#chat{
  position:absolute;left:0;top:571px;
  width:1920px;height:509px;z-index:30;display:none;
}
#chat-frame{position:absolute;top:0;left:0;width:1920px;height:509px;object-fit:fill;}
#chat-name{
  position:absolute;left:238px;top:58px;width:317px;height:91px;
  font-family:'neodgm',monospace;font-size:60px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  z-index:31;pointer-events:none;
}
#chat-text{
  position:absolute;left:223px;top:168px;width:1481px;
  font-family:'neodgm',monospace;font-size:60px;
  color:#fff;line-height:90px;white-space:pre-wrap;
  z-index:31;pointer-events:none;
}
#chat-text.narr{color:rgba(255,255,255,.55);}
#chat-text.boss{color:#FF6E34;}
#type-wrap{
  position:absolute;left:223px;top:168px;width:1481px;
  display:none;flex-direction:column;gap:8px;
  z-index:32;pointer-events:all;
}
#type-wrap.active{display:flex;}
#type-top{position:relative;width:100%;height:90px;}
#type-hint{
  position:absolute;top:0;left:0;width:100%;height:100%;
  font-family:'neodgm',monospace;font-size:60px;
  color:rgba(255,255,255,.22);line-height:90px;
  pointer-events:none;overflow:hidden;white-space:nowrap;
}
#type-input{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:transparent;border:none;outline:none;
  font-family:'neodgm',monospace;font-size:60px;
  color:#fff;line-height:90px;caret-color:#ff7700;padding:0;
}
#type-label{
  font-family:'neodgm',monospace;font-size:18px;
  color:rgba(255,255,255,.55);pointer-events:none;
}
#adv-hint{
  position:absolute;right:110px;bottom:22px;
  font-family:'neodgm',monospace;font-size:24px;
  color:rgba(255,150,0,.85);z-index:32;
  animation:blink 1.2s ease infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── FADE ── */
#fade{
  position:absolute;inset:0;z-index:100;
  background:#000;opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}
#fade.in{opacity:1;pointer-events:all;}

/* ── INTRO ── */
#intro{position:absolute;inset:0;z-index:200;background:#000;}
#intro-bg{
  position:absolute;inset:0;
  background:url('data/BG/intro.png') center/cover;
  opacity:0;transition:opacity 1.2s;
}
#sg-intro{
  position:absolute;left:230px;top:0;
  width:1080px;height:1080px;opacity:0;z-index:1;object-fit:contain;
}
#sg-intro.appear{animation:sg-pop .5s ease forwards;}
#title-img{
  position:absolute;left:230px;top:0;
  width:1080px;height:1080px;
  object-fit:contain;opacity:0;z-index:2;
  transform-origin:center center;
}
#title-img.bang{animation:title-bang .55s cubic-bezier(.22,.61,.36,1) forwards;}
@keyframes title-bang{
  0%  {transform:scale(1.55) rotate(-3deg);opacity:0;}
  45% {transform:scale(.93)  rotate(.5deg);opacity:1;}
  75% {transform:scale(1.04);opacity:1;}
  100%{transform:scale(1);   opacity:1;}
}
/* btn.png: 위 50% = 게임시작, 아래 50% = 게임설명 */
#btn-wrap{
  position:absolute;left:1576px;top:776px;
  width:344px;height:304px;
  z-index:3;display:none;
}
#btn-wrap.show{display:block;}
#btn-wrap img{width:344px;height:304px;object-fit:contain;display:block;}
#btn-start{
  position:absolute;top:0;left:0;
  width:344px;height:152px;cursor:pointer;
}
#btn-desc-hit{
  position:absolute;top:152px;left:0;
  width:344px;height:152px;cursor:pointer;
}

/* 인트로 시리얼 버튼 */
#serial-intro-btn{
  position:absolute;left:1576px;top:690px;width:344px;
  font-family:'neodgm',monospace;font-size:22px;
  background:rgba(0,0,0,.65);border:2px solid #555;
  color:#ccc;padding:10px 0;cursor:pointer;
  z-index:4;text-align:center;display:none;
}
#serial-intro-btn.show{display:block;}
#serial-intro-btn.on{border-color:#5b9d7a;color:#5b9d7a;}

/* ── DESC OVERLAY (Figma layout) ── */
#desc-overlay{
  position:absolute;inset:0;z-index:210;
  display:none;
  background:url('data/desc/BG/desc.png') center/cover no-repeat;
}
#desc-overlay.show{display:flex;}
#desc-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;
  padding:175px 200px;gap:54px;
  box-sizing:border-box;
}
#desc-img-frame{
  width:1520px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
#desc-slide-img{
  max-width:1520px;
  object-fit:contain;
}
#desc-slide-text{
  width:1520px;
  font-family:'neodgm',monospace;font-size:48px;line-height:72px;
  color:#000;text-align:center;white-space:pre-wrap;
}
#desc-footer{
  width:1520px;
  display:flex;justify-content:center;gap:225px;
}
#desc-footer span{
  font-family:'neodgm',monospace;font-size:48px;line-height:72px;
  color:#FF6E34;
}

/* ── ENDING CONNECT ── */
#end-connect{
  position:absolute;inset:0;z-index:130;
  background:#363636;display:none;
  align-items:center;justify-content:center;
}
#ec-inner{display:flex;flex-direction:column;align-items:center;gap:36px;width:570px;}
#ec-icons{display:flex;gap:54px;}
#ec-icons img{width:205px;height:205px;object-fit:contain;image-rendering:pixelated;}
#ec-text{
  font-family:'neodgm',monospace;font-size:60px;
  color:#FF6E34;text-align:center;line-height:90px;
  white-space:pre-wrap;width:570px;
}

/* ── ENDING ── */
#ending{
  position:absolute;bottom:80px;left:0;right:0;
  z-index:150;display:none;justify-content:center;
}
#ending.show{display:flex;}
.again-btn{
  font-family:'neodgm',monospace;font-size:28px;
  background:rgba(0,0,0,.7);border:2px solid #ff6600;
  color:#ff6600;padding:14px 36px;cursor:pointer;
}
.again-btn:hover{background:rgba(255,102,0,.18);}

/* ── SERIAL (in-game) ── */
#serial-btn{
  position:absolute;bottom:12px;right:14px;z-index:50;
  font-family:'neodgm',monospace;font-size:18px;
  background:rgba(0,0,0,.6);border:1px solid #555;
  color:#888;padding:4px 12px;cursor:pointer;
}
#serial-btn.on{border-color:#5b9d7a;color:#5b9d7a;}
</style>
</head>
<body>
<div id="game">
  <div id="fade"></div>
  <div id="dim-overlay"></div>

  <!-- INTRO -->
  <div id="intro">
    <div id="intro-bg"></div>
    <img id="sg-intro" src="data/strGraph.png" alt="">
    <img id="title-img" src="data/title.png" alt="오늘도 참는다">
    <!-- btn.png 상단=게임시작 / 하단=게임설명 -->
    <div id="btn-wrap">
      <img src="data/btn.png" alt="">
      <div id="btn-start" onclick="startGame()"></div>
      <div id="btn-desc-hit" onclick="openDesc()"></div>
    </div>
    <button id="serial-intro-btn" onclick="toggleSerial()">🔌 Arduino 연결</button>
  </div>

  <!-- GAME -->
  <div id="bg"></div>
  <img id="str-graph" src="data/strGraph.png" alt="">
  <div id="sj-wrap"><img id="sj-img" src="data/SJ/default.png" alt="사장님"></div>

  <!-- STATUS -->
  <div id="status">
    <div class="stat-row"><img src="data/icon/mny.png" alt="월급"><span class="stat-val" id="mv">50</span></div>
    <div class="stat-row"><img src="data/icon/str.png" alt="스트레스"><span class="stat-val" id="sv">50</span></div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <img id="chat-frame" src="data/chat/chat.png" alt="">
    <div id="chat-name"></div>
    <div id="chat-text"></div>
    <div id="type-wrap">
      <div id="type-top">
        <div id="type-hint"></div>
        <input id="type-input" type="text" autocomplete="off" spellcheck="false">
      </div>
      <div id="type-label">[타이핑하세요]</div>
    </div>
    <div id="adv-hint">▼ Enter</div>
  </div>

  <!-- DESC OVERLAY (HTML 기반 Figma 레이아웃) -->
  <div id="desc-overlay">
    <div id="desc-content">
      <div id="desc-img-frame">
        <img id="desc-slide-img" src="" alt="">
      </div>
      <div id="desc-slide-text"></div>
      <div id="desc-footer">
        <span>Enter to next</span>
        <span>Esc to close</span>
      </div>
    </div>
  </div>

  <!-- ENDING CONNECT -->
  <div id="end-connect">
    <div id="ec-inner">
      <div id="ec-icons">
        <img src="data/icon/mny.png" alt="">
        <img src="data/icon/str.png" alt="">
      </div>
      <div id="ec-text"></div>
    </div>
  </div>

  <!-- ENDING -->
  <div id="ending">
    <button class="again-btn" onclick="restartGame()">처음 화면으로</button>
  </div>

  <button id="serial-btn" onclick="toggleSerial()">🔌</button>
</div>

<script>
/* ── SCALE ── */
function scaleGame(){
  const s=Math.min(innerWidth/1920,innerHeight/1080);
  const g=document.getElementById('game');
  g.style.transform=`scale(${s})`;
  g.style.left=((innerWidth-1920*s)/2)+'px';
  g.style.top=((innerHeight-1080*s)/2)+'px';
}
addEventListener('resize',scaleGame);scaleGame();
const $=id=>document.getElementById(id);

/* ── AUDIO ── */
// MP3 경로: mp3/ 폴더
const SFX={};
['subway','alarm','crowd','bell2','no','buzzer','boom'].forEach(n=>{
  SFX[n]=new Audio('mp3/'+n+'.mp3');
});
SFX.coin3=new Audio('mp3/coin3.mp3');
SFX.subway.loop=true;
SFX.crowd.loop=true;

// 브라우저 autoplay 정책 우회: 첫 클릭 시 모든 Audio 잠금 해제
let audioUnlocked=false;
document.addEventListener('click',()=>{
  if(audioUnlocked)return;
  audioUnlocked=true;
  // 무음 재생으로 AudioContext 해제
  Object.values(SFX).forEach(s=>{
    const prev=s.src;
    s.volume=0;
    s.play().then(()=>{s.pause();s.currentTime=0;s.volume=1;}).catch(()=>{s.volume=1;});
  });
},{once:true});

function playSound(name){
  const s=SFX[name];if(!s)return;
  s.currentTime=0;s.play().catch(()=>{});
}
function stopSound(name){
  const s=SFX[name];if(!s)return;
  s.pause();s.currentTime=0;
}
let ambientName=null;
function setAmbient(name){
  if(ambientName===name)return;
  if(ambientName)stopSound(ambientName);
  ambientName=name;
  if(name){SFX[name].currentTime=0;SFX[name].play().catch(()=>{});}
}
function trySubway(){
  if(ambientName!=='subway')setAmbient('subway');
}

const DESC_DATA=[
  {
    img:'data/desc/desc_image/image_1.png', h:334,
    text:'오늘 하루도 돈을 벌기 위해 열심히 일하는 당신!\n계속되는 스트레스 속에서 분노를 조절하고\n무사히 하루를 마무리 할 수 있을까?!'
  },
  {

  },
  {
    img:'data/desc/desc_image/image_3.png', h:200,
    text:"짜증나는 사장님의 말을 듣고, 화를 낼지 말지 결정하세요!\n  '돈 벌자..!' 돈다발을 흔들며 마음을 다스려봅시다~\n  '못참겠다!' 버저버튼을 눌러 속마음을 쏟아냅시다!"
  },
  {
    img:'data/desc/desc_image/image_4.png', h:205,
    text:'변화하는 돈&스트레스 점수에 따라 엔딩이 결정됩니다!\n화병과 함께 월급을 얻을것인가,\n때려치우고 후련함을 얻을건인가! 선택은 당신의 몫입니다.'
  }
];
let descIdx=0;
function openDesc(){
  trySubway();
  descIdx=0;
  showDescSlide();
  $('desc-overlay').classList.add('show');
}
function showDescSlide(){
  const d=DESC_DATA[descIdx];
  const img=$('desc-slide-img');
  img.src=d.img;
  img.style.height=d.h+'px';
  $('desc-slide-text').textContent=d.text;
}
function descNext(){
  descIdx++;
  if(descIdx>=DESC_DATA.length){closeDesc();return;}
  showDescSlide();
}
function closeDesc(){
  $('desc-overlay').classList.remove('show');
}

/* ── STATE ── */
let G={str:50,mny:50,rpt:50};
let curSc=0,curLn=0,waiting=false,pend=null,curChoice=null;
let sjState=null,sjVisible=false;
let typerT=null,typerFull='';
let pTarget='',pEff=null,pCompose=false;

function freshG(){return{str:50,mny:50,rpt:50};}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function hud(){$('sv').textContent=G.str;$('mv').textContent=G.mny;}
function applyEff(e){
  if(!e)return;
  if(e.str)G.str=clamp(G.str+e.str,0,100);
  if(e.mny)G.mny=clamp(G.mny+e.mny,0,100);
  if(e.rpt)G.rpt=clamp(G.rpt+e.rpt,0,100);
  hud();
}

/* ── INTRO ── */
addEventListener('load',()=>{
  setTimeout(()=>{
    $('intro-bg').style.opacity='1';
    setTimeout(()=>{
      $('title-img').classList.add('bang');
      setTimeout(()=>{
        $('sg-intro').classList.add('appear');
        $('btn-wrap').classList.add('show');
        $('serial-intro-btn').classList.add('show');
      },200);

/* ── START / RESTART ── */
function startGame(){
  closeDesc();
  setAmbient(null);
  $('intro').style.transition='opacity .5s';
  $('intro').style.opacity='0';
  setTimeout(()=>$('intro').style.display='none',500);
  G=freshG();hud();
  $('status').style.display='block';
  $('chat').style.display='block';
  runScene(0);
}
function restartGame(){
  $('ending').classList.remove('show');
  $('end-connect').style.display='none';
  $('dim-overlay').style.opacity='0';
  G=freshG();hud();
  $('status').style.display='none';
  $('chat').style.display='none';
  $('sj-wrap').style.display='none';
  $('str-graph').style.opacity='0';$('str-graph').classList.remove('sgshow');
  $('bg').style.backgroundImage='';
  setAmbient(null);
  waiting=false;pend=null;curChoice=null;
  $('intro').style.display='block';
  $('intro').style.opacity='0';
  $('intro').style.transition='';
  $('title-img').classList.remove('bang');
  $('sg-intro').classList.remove('appear');
  $('btn-wrap').classList.remove('show');
  $('serial-intro-btn').classList.remove('show');
  $('intro-bg').style.opacity='0';
  sjVisible=false;sjState=null;
  setTimeout(()=>{
    $('intro').style.opacity='1';
    setTimeout(()=>{
      $('intro-bg').style.opacity='1';
      setTimeout(()=>$('title-img').classList.add('bang'),300);
      setTimeout(()=>{
        $('sg-intro').classList.add('appear');
        $('btn-wrap').classList.add('show');
        $('serial-intro-btn').classList.add('show');
        setAmbient('subway');
      },500);
    },100);
  },60);
}

/* ── BG ── */
function setBG(name){
  // Audio per BG
  if(name==='home_out'){setAmbient(null);setTimeout(()=>playSound('alarm'),420);}
  else if(name==='job'){setAmbient('crowd');}
  else{setAmbient(null);}

  const fade=$('fade');
  fade.classList.add('in');
  setTimeout(()=>{
    $('bg').style.backgroundImage=`url('data/BG/${name}.png')`;
    fade.classList.remove('in');
  },400);
}

/* ── SJ ── */
function setSJ(state){
  const wrap=$('sj-wrap'),img=$('sj-img'),sg=$('str-graph');
  if(state===null||state===undefined){
    wrap.style.display='none';
    sg.style.opacity='0';sg.classList.remove('sgshow');
    sjVisible=false;sjState=null;
    return;
  }
  if(state!==sjState){
    if(state==='default') playSound('bell2');
    else if(state==='upset') playSound('no');
    else if(state==='point') playSound('boom');
  }
  sjState=state;
  img.src=`data/SJ/${state}.png`;
  if(state==='point'){
    img.className='bang-in';
    sg.classList.remove('sgshow');void sg.offsetWidth;sg.classList.add('sgshow');
  } else {
    sg.style.opacity='0';sg.classList.remove('sgshow');
    img.className='slide-in';
  }
  wrap.style.display='block';
  sjVisible=true;
}

/* ── TYPEWRITER ── */
function typeWrite(el,txt,speed,done){
  clearInterval(typerT);typerFull=txt;el.textContent='';let i=0;
  typerT=setInterval(()=>{
    el.textContent+=txt[i++];
    if(i>=txt.length){clearInterval(typerT);typerT=null;if(done)done();}
  },speed||32);
}
function skipTyper(el){
  if(typerT){clearInterval(typerT);typerT=null;el.textContent=typerFull;return true;}
  return false;
}

/* ── SCENE RUNNER ── */
function runScene(si){
  curSc=si;curLn=0;
  const sc=SCENES[si];
  setBG(sc.bg);
  if(sc.sj!==undefined)setSJ(sc.sj);
  setTimeout(()=>nextLine(),440);
}

function nextLine(){
  const sc=SCENES[curSc];
  if(curLn>=sc.lines.length){
    if(curSc+1<SCENES.length)runScene(curSc+1);
    else showEnding();
    return;
  }
  const ln=sc.lines[curLn++];
  if(ln.sj!==undefined)setSJ(ln.sj);
  if(ln.type==='choice'){showChoice(ln);return;}

  $('chat-frame').src='data/chat/chat.png';
  $('type-wrap').classList.remove('active');
  $('chat-text').style.display='';
  $('adv-hint').style.display='block';
  $('chat-name').className='';
  const el=$('chat-text');

  if(ln.sty==='narr'){
    $('chat-name').textContent='';
    el.className='narr';
    typeWrite(el,ln.tx,42);
    setWait(()=>{if(ln.eff)applyEff(ln.eff);nextLine();});
  } else if(ln.type==='p'){
    $('adv-hint').style.display='none';
    $('chat-text').style.display='none';
    startPType(ln.tx,ln.eff);
  } else if(ln.type==='pn'){
    $('chat-name').textContent='나';
    el.className='';
    typeWrite(el,ln.tx,32);
    setWait(()=>{if(ln.eff)applyEff(ln.eff);nextLine();});
  } else {
    $('chat-name').textContent=ln.sp||'';
    el.className=ln.sp==='사장님'?'boss':'';
    typeWrite(el,ln.tx,32);
    setWait(()=>nextLine());
  }
}

/* ── P TYPING ── */
function startPType(target,eff){
  pTarget=target;pEff=eff||null;
  $('chat-name').textContent='나';$('chat-name').className='';
  $('type-hint').textContent=target;
  const inp=$('type-input');
  inp.value='';
  $('type-wrap').classList.add('active');
  setTimeout(()=>inp.focus(),30);
  inp.oncompositionstart=()=>pCompose=true;
  inp.oncompositionend=()=>pCompose=false;
  inp.onkeydown=e=>{
    if(e.key==='Enter'&&!pCompose){
      e.preventDefault();
      if(inp.value.trim().length>=1)confirmPType();
    }
  };
}
function confirmPType(){
  const inp=$('type-input');
  inp.onkeydown=null;inp.oncompositionstart=null;inp.oncompositionend=null;
  $('type-wrap').classList.remove('active');
  $('chat-text').style.display='';
  $('chat-text').className='';
  $('chat-text').textContent=pTarget;
  if(pEff)applyEff(pEff);
  nextLine();
}

/* ── CHOICE ── */
function showChoice(ln){
  curChoice=ln;
  $('chat-frame').src='data/chat/choice.png';
  $('type-wrap').classList.remove('active');
  $('chat-text').style.display='none';
  $('chat-name').textContent='';$('chat-name').className='';
  $('adv-hint').style.display='none';
  waiting=false;pend=null;
}
function pickStr(){
  if(!curChoice)return;
  playSound('buzzer');
  const c=curChoice.str;curChoice=null;
  applyEff(c.eff);
  $('chat-text').style.display='';
  showPLine(c.ptx,()=>{setSJ(c.bsj);showBossLine(c.btx,()=>nextLine());});
}
function pickEnd(){
  if(!curChoice)return;
  playSound('coin3');
  const c=curChoice.end;curChoice=null;
  applyEff(c.eff);
  $('chat-text').style.display='';
  showPLine(c.ptx,()=>{setSJ(c.bsj);showBossLine(c.btx,()=>nextLine());});
}
function showPLine(txt,cb){
  $('chat-frame').src='data/chat/chat.png';
  $('chat-name').textContent='나';$('chat-name').className='';
  const el=$('chat-text');el.className='';
  typeWrite(el,txt,32);
  $('adv-hint').style.display='block';
  setWait(cb);
}
function showBossLine(txt,cb){
  $('chat-name').textContent='사장님';$('chat-name').className='';
  const el=$('chat-text');el.className='boss';
  typeWrite(el,txt,32);
  $('adv-hint').style.display='block';
  setWait(cb);
}

/* ── WAIT / ADVANCE ── */
function setWait(fn){waiting=true;pend=fn;}
function advance(){
  if(curChoice)return;
  if(skipTyper($('chat-text')))return;
  if(!waiting)return;
  waiting=false;
  const fn=pend;pend=null;
  if(fn)fn();
}

/* ── ENDINGS ── */
const ENDS={
  e1:{bg:'Endling_1',
      lines:[
        '하... 고분 고분 대답하느라 너무 지쳤어',
        '__blackout__',
        '어우, 잘잤다. 지금 몇시야?',
        '__dim__',
        '어?? 오후 8시? 아씨, 내 휴일!!'
      ]},
  e2:{bg:'Endling_2',
      lines:['아, 오늘도 잘 참았다. 기분 좋게 맥주 하나 때리고 잠이나 자자']},
  e3:{bg:'Endling_3',
      lines:['결국 잘렸지만, 이딴 거지같은 사장 밑에서는 일 못해. 다른 알바나 구하자']}
};
function resolveEndingKey(){
  if(G.str>=85&&G.mny>=60)return'e1';
  if(G.mny<40||G.str<=10)return'e3';
  return'e2';
}

function showEnding(){
  setSJ(null);setAmbient(null);
  $('status').style.display='none';
  const fd=$('fade');
  fd.classList.add('in');
  setTimeout(()=>{
    $('chat').style.display='none';
    $('bg').style.backgroundImage='';
    $('ec-text').textContent='';
    $('end-connect').style.display='flex';
    fd.classList.remove('in');
    setTimeout(()=>{
      typeWrite($('ec-text'),'오늘도 잘 참았을까?\n계산 중 . . .',80,()=>{
        setTimeout(()=>{
          fd.classList.add('in');
          setTimeout(()=>{
            $('end-connect').style.display='none';
            startEndingScreen(resolveEndingKey());
          },400);
        },1200);
      });
    },450);
  },400);
}

function startEndingScreen(key){
  const E=ENDS[key];
  const fd=$('fade');
  $('bg').style.backgroundImage=`url('data/BG/${E.bg}.png')`;
  $('chat').style.display='block';
  $('chat-frame').src='data/chat/chat.png';
  $('type-wrap').classList.remove('active');
  $('chat-text').style.display='';
  $('adv-hint').style.display='none';
  $('chat-name').textContent='나';
  $('chat-name').className='';
  fd.classList.remove('in');

  let idx=0;
  function nextEndLine(){
    if(idx>=E.lines.length){
      $('adv-hint').style.display='none';
      $('ending').classList.add('show');
      return;
    }
    const line=E.lines[idx++];
    if(line==='__blackout__'){
      fd.classList.add('in');
      setTimeout(()=>{fd.classList.remove('in');setTimeout(nextEndLine,450);},400);
      return;
    }
    if(line==='__dim__'){
      $('dim-overlay').style.opacity='0.55';
      setTimeout(nextEndLine,300);
      return;
    }
    const el=$('chat-text');el.className='';
    typeWrite(el,line,42,()=>{
      $('adv-hint').style.display='block';
      setWait(()=>{$('adv-hint').style.display='none';nextEndLine();});
    });
  }
  setTimeout(nextEndLine,450);
}

/* ── INPUT ── */
document.addEventListener('keydown',e=>{
  // DESC overlay 우선 처리
  if($('desc-overlay').style.display!=='none'){
    if(e.key==='Enter'){e.preventDefault();descNext();return;}
    if(e.key==='Escape'){e.preventDefault();closeDesc();return;}
    return;
  }
  if(e.target.id==='type-input')return;
  if(e.key==='Enter'){
    e.preventDefault();
    if(!curChoice)advance();
    return;
  }
  if((e.key==='p'||e.key==='P')&&curChoice){pickStr();return;}
  if((e.key==='t'||e.key==='T')&&curChoice){pickEnd();return;}
  if(e.key==='Escape'){closeDesc();return;}
});
// 클릭: 타이핑 스킵만
document.addEventListener('click',e=>{
  if(e.target.closest('#ending')||e.target.closest('#intro')||e.target.id==='serial-btn')return;
  if(curChoice||e.target.id==='type-input')return;
  skipTyper($('chat-text'));
});

/* ── WEB SERIAL ── */
let serialPort=null,serialReader=null,arduinoConnected=false;

function setSerialUI(connected){
  arduinoConnected=connected;
  const icon=connected?'✅':'🔌';
  $('serial-btn').textContent=icon;
  $('serial-btn').classList.toggle('on',connected);
  $('serial-intro-btn').textContent=connected?'✅ 연결됨':'🔌 Arduino 연결';
  $('serial-intro-btn').classList.toggle('on',connected);
}

async function toggleSerial(){
  trySubway(); // 버튼 클릭 → subway 재생 허용
  if(arduinoConnected){
    try{if(serialReader){await serialReader.cancel();serialReader=null;}}catch(e){}
    try{await serialPort.close();}catch(e){}
    serialPort=null;
    setSerialUI(false);
    return;
  }
  if(!('serial' in navigator)){alert('Chrome/Edge + 로컬서버 필요');return;}
  try{
    serialPort=await navigator.serial.requestPort();
    await serialPort.open({baudRate:9600});
    setSerialUI(true);
    readSerial();
  }catch(err){if(err.name!=='NotFoundError')alert('연결 실패: '+err.message);}
}

async function readSerial(){
  const dec=new TextDecoder();
  let buf='';
  try{
    serialReader=serialPort.readable.getReader();
    while(true){
      const{value,done}=await serialReader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();
      for(const l of lines){const m=l.trim();if(m)onArduino(m);}
    }
  }catch(err){
    // 연결 끊김
  }finally{
    if(serialReader){try{serialReader.releaseLock();}catch(e){}}
    serialReader=null;
    setSerialUI(false);
  }
}

function onArduino(msg){
  // SHAKE(tilt) = T키 = 참기/endure
  if((msg==='SHAKE'||msg==='A')&&curChoice){pickEnd();return;}
  // PIEZO(buzzer) = P키 = 분출/vent
  if((msg==='PIEZO'||msg==='B'||msg==='BTN:1')&&curChoice){pickStr();return;}
}
