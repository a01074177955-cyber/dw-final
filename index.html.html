<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오늘도 참는다</title>
<style>
@font-face{font-family:'neodgm';src:url('data/neodgm_code.woff') format('woff');}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

#game{
  position:absolute;
  width:1920px;height:1080px;
  transform-origin:top left;
  overflow:hidden;
}
#bg{position:absolute;inset:0;background-size:cover;background-position:center;}

/* ── SJ: 1080×1080, x:840 y:0, z-index below chat ── */
#sj-wrap{
  position:absolute;
  left:840px;top:0;
  width:1080px;height:1080px;
  display:none;
  z-index:10;
}
#sj-img{
  width:1080px;height:1080px;
  object-fit:contain;object-position:bottom;
}
#sj-img.slide-in{animation:sj-slide .3s ease forwards;}
@keyframes sj-slide{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
#sj-img.bang-in{animation:sj-bang .25s ease forwards;}
@keyframes sj-bang{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}

/* ── STRGRAPH ── */
#str-graph{
  position:absolute;
  left:840px;top:200px;
  width:280px;opacity:0;z-index:8;pointer-events:none;
}
#str-graph.sgshow{animation:sg-pop .3s ease forwards;}
@keyframes sg-pop{
  0%{opacity:0;transform:scale(.5) rotate(-10deg);}
  60%{transform:scale(1.1) rotate(2deg);}
  100%{opacity:1;transform:scale(1) rotate(0);}
}

/* ── STATUS ── */
#status{position:absolute;left:0;top:0;z-index:20;display:none;padding:60px;}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.stat-row img{width:80px;height:80px;image-rendering:pixelated;object-fit:contain;}
.stat-val{
  font-family:'neodgm',monospace;font-size:60px;color:#fff;
  text-shadow:3px 3px 0 #000,-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000;
  min-width:60px;
}

/* ── CHAT BOX: z-index:30, above SJ z-index:10 ── */
#chat{
  position:absolute;left:0;top:571px;
  width:1920px;height:509px;
  z-index:30;display:none;
}
#chat-frame{
  position:absolute;top:0;left:0;
  width:1920px;height:509px;object-fit:fill;
}
/* Name tab: matches Figma Frame 34 position (left:238 top:58 w:317 h:91) */
#chat-name{
  position:absolute;
  left:238px;top:58px;width:317px;height:91px;
  font-family:'neodgm',monospace;font-size:60px;
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  z-index:31;pointer-events:none;
}
/* Dialogue text: matches Figma text position (x:223 y:168 w:1481) */
#chat-text{
  position:absolute;
  left:223px;top:168px;
  width:1481px;
  font-family:'neodgm',monospace;font-size:60px;
  color:#fff;line-height:90px;
  white-space:pre-wrap;
  z-index:31;pointer-events:none;
}
#chat-text.narr{color:rgba(255,255,255,.55);}
#chat-text.boss{color:#FF6E34;}

/* Typing wrap: same position as chat-text */
#type-wrap{
  position:absolute;
  left:223px;top:168px;
  width:1481px;
  display:none;flex-direction:column;gap:8px;
  z-index:32;pointer-events:all;
}
#type-wrap.active{display:flex;}
#type-top{
  position:relative;width:100%;height:90px;
}
#type-hint{
  position:absolute;top:0;left:0;width:100%;height:100%;
  font-family:'neodgm',monospace;font-size:60px;
  color:rgba(255,255,255,.22);
  line-height:90px;
  pointer-events:none;overflow:hidden;white-space:nowrap;
}
#type-input{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:transparent;border:none;outline:none;
  font-family:'neodgm',monospace;font-size:60px;
  color:#fff;line-height:90px;caret-color:#ff7700;
  padding:0;
}
#type-label{
  font-family:'neodgm',monospace;font-size:18px;
  color:rgba(255,255,255,.55);pointer-events:none;
}

/* Advance hint */
#adv-hint{
  position:absolute;right:110px;bottom:22px;
  font-family:'neodgm',monospace;font-size:24px;
  color:rgba(255,150,0,.85);z-index:32;
  animation:blink 1.2s ease infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── FADE ── */
#fade{
  position:absolute;inset:0;z-index:100;
  background:#000;opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}
#fade.in{opacity:1;pointer-events:all;}

/* ── INTRO ── */
#intro{position:absolute;inset:0;z-index:200;background:#000;}
#intro-bg{
  position:absolute;inset:0;
  background:url('data/BG/intro.png') center/cover;
  opacity:0;transition:opacity 1.2s;
}
#sg-intro{
  position:absolute;left:50%;top:50%;
  width:min(520px,48vw);opacity:0;
  transform:translate(-50%,-50%);z-index:1;
}
#sg-intro.appear{animation:sg-pop .5s ease forwards;}
#title-img{
  position:absolute;left:50%;top:50%;
  width:min(640px,60vw);opacity:0;z-index:2;
  transform:translate(-50%,-50%) scale(1.5);
  cursor:pointer;pointer-events:none;
  filter:drop-shadow(0 6px 32px rgba(0,0,0,.8));
}
#title-img.bang{
  animation:title-bang .55s cubic-bezier(.22,.61,.36,1) forwards;
  pointer-events:all;
}
@keyframes title-bang{
  0%  {transform:translate(-50%,-50%) scale(1.55) rotate(-3deg);opacity:0;}
  45% {transform:translate(-50%,-50%) scale(.93)  rotate(.5deg);opacity:1;}
  75% {transform:translate(-50%,-50%) scale(1.04);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1);   opacity:1;}
}
#intro-hint{
  position:absolute;bottom:5%;width:100%;text-align:center;
  font-family:'neodgm',monospace;font-size:22px;
  color:rgba(255,255,255,.5);animation:blink 1.4s infinite;display:none;
}

/* ── ENDING: restart button only, chat shows ending content ── */
#ending{
  position:absolute;bottom:80px;left:0;right:0;
  z-index:150;display:none;justify-content:center;
}
#ending.show{display:flex;}
.again-btn{
  font-family:'neodgm',monospace;font-size:28px;
  background:rgba(0,0,0,.7);border:2px solid #ff6600;
  color:#ff6600;padding:14px 36px;cursor:pointer;
}
.again-btn:hover{background:rgba(255,102,0,.18);}

/* ── SERIAL ── */
#serial-btn{
  position:absolute;bottom:12px;right:14px;z-index:50;
  font-family:'neodgm',monospace;font-size:18px;
  background:rgba(0,0,0,.6);border:1px solid #555;
  color:#888;padding:4px 12px;cursor:pointer;
}
#serial-btn.on{border-color:#5b9d7a;color:#5b9d7a;}
</style>
</head>
<body>
<div id="game">
  <div id="fade"></div>

  <!-- INTRO -->
  <div id="intro">
    <div id="intro-bg"></div>
    <img id="sg-intro" src="data/strGraph.png" alt="">
    <img id="title-img" src="data/title.png" alt="오늘도 참는다" onclick="onTitleClick()">
    <div id="intro-hint">클릭해서 출근하기</div>
  </div>

  <!-- GAME -->
  <div id="bg"></div>
  <img id="str-graph" src="data/strGraph.png" alt="">
  <div id="sj-wrap"><img id="sj-img" src="data/SJ/default.png" alt="사장님"></div>

  <!-- STATUS -->
  <div id="status">
    <div class="stat-row"><img src="data/icon/mny.png" alt="월급"><span class="stat-val" id="mv">50</span></div>
    <div class="stat-row"><img src="data/icon/str.png" alt="스트레스"><span class="stat-val" id="sv">50</span></div>
    <div class="stat-row"><img src="data/icon/rpt.png" alt="관계"><span class="stat-val" id="rv">50</span></div>
  </div>

  <!-- CHAT BOX -->
  <div id="chat">
    <img id="chat-frame" src="data/chat/chat.png" alt="">
    <div id="chat-name"></div>
    <div id="chat-text"></div>
    <div id="type-wrap">
      <div id="type-top">
        <div id="type-hint"></div>
        <input id="type-input" type="text" autocomplete="off" spellcheck="false">
      </div>
      <div id="type-label">[타이핑하세요]</div>
    </div>
    <div id="adv-hint">▼ Space</div>
  </div>

  <!-- ENDING: chat stays visible, only restart btn appears -->
  <div id="ending">
    <button class="again-btn" onclick="restartGame()">다시 출근하기</button>
  </div>

  <button id="serial-btn" onclick="toggleSerial()">🔌</button>
</div>

}
addEventListener('resize',scaleGame);scaleGame();
const $=id=>document.getElementById(id);

/* ── STATE ── */
let G={str:50,mny:50,rpt:50};
let curSc=0,curLn=0,waiting=false,pend=null,curChoice=null;
let sjState=null,sjVisible=false;
let typerT=null,typerFull='';
let pTarget='',pEff=null,pCompose=false;

function freshG(){return{str:50,mny:50,rpt:50};}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* ── HUD ── */
function hud(){
  $('sv').textContent=G.str;
  $('mv').textContent=G.mny;
  $('rv').textContent=G.rpt;
}
function applyEff(e){
  if(!e)return;
  if(e.str)G.str=clamp(G.str+e.str,0,100);
  if(e.mny)G.mny=clamp(G.mny+e.mny,0,100);
  if(e.rpt)G.rpt=clamp(G.rpt+e.rpt,0,100);
  hud();
}

/* ── INTRO ── */
addEventListener('load',()=>{
  setTimeout(()=>{
    $('intro-bg').style.opacity='1';
    setTimeout(()=>{
      $('title-img').classList.add('bang');
      setTimeout(()=>{
        $('sg-intro').classList.add('appear');
        $('intro-hint').style.display='block';
      },200);
    },300);
  },200);
});
function onTitleClick(){
  if(!$('title-img').classList.contains('bang'))return;
  startGame();
}

/* ── START / RESTART ── */
function startGame(){
  $('intro').style.transition='opacity .5s';
  $('intro').style.opacity='0';
  setTimeout(()=>$('intro').style.display='none',500);
  G=freshG();hud();
  $('status').style.display='block';
  $('chat').style.display='block';
  runScene(0);
}
function restartGame(){
  $('ending').classList.remove('show');
  G=freshG();hud();
  $('status').style.display='none';
  $('chat').style.display='none';
  $('sj-wrap').style.display='none';
  $('str-graph').style.opacity='0';$('str-graph').classList.remove('sgshow');
  $('bg').style.backgroundImage='';
  waiting=false;pend=null;curChoice=null;
  $('intro').style.display='block';
  $('intro').style.opacity='0';
  $('intro').style.transition='';
  $('title-img').classList.remove('bang');
  $('sg-intro').classList.remove('appear');
  $('intro-hint').style.display='none';
  $('intro-bg').style.opacity='0';
  sjVisible=false;sjState=null;
  setTimeout(()=>{
    $('intro').style.opacity='1';
    setTimeout(()=>{
      $('intro-bg').style.opacity='1';
      setTimeout(()=>$('title-img').classList.add('bang'),300);
      setTimeout(()=>{$('sg-intro').classList.add('appear');$('intro-hint').style.display='block';},500);
    },100);
  },60);
}

/* ── BG ── */
function setBG(name){
  const fade=$('fade');
  fade.classList.add('in');
  setTimeout(()=>{
    $('bg').style.backgroundImage=`url('data/BG/${name}.png')`;
    fade.classList.remove('in');
  },400);
}

/* ── SJ ── */
function setSJ(state){
  const wrap=$('sj-wrap'),img=$('sj-img'),sg=$('str-graph');
  if(state===null||state===undefined){
    wrap.style.display='none';
    sg.style.opacity='0';sg.classList.remove('sgshow');
    sjVisible=false;sjState=null;
    return;
  }
  sjState=state;
  img.src=`data/SJ/${state}.png`;
  if(state==='point'){
    img.className='bang-in';
    sg.classList.remove('sgshow');void sg.offsetWidth;sg.classList.add('sgshow');
  } else {
    sg.style.opacity='0';sg.classList.remove('sgshow');
    img.className='slide-in';
  }
  wrap.style.display='block';
  sjVisible=true;
}

/* ── TYPEWRITER ── */
function typeWrite(el,txt,speed,done){
  clearInterval(typerT);typerFull=txt;el.textContent='';let i=0;
  typerT=setInterval(()=>{
    el.textContent+=txt[i++];
    if(i>=txt.length){clearInterval(typerT);typerT=null;if(done)done();}
  },speed||32);
}
function skipTyper(el){
  if(typerT){clearInterval(typerT);typerT=null;el.textContent=typerFull;return true;}
  return false;
}

/* ── SCENE RUNNER ── */
function runScene(si){
  curSc=si;curLn=0;
  const sc=SCENES[si];
  setBG(sc.bg);
  if(sc.sj!==undefined)setSJ(sc.sj);
  setTimeout(()=>nextLine(),440);
}

function nextLine(){
  const sc=SCENES[curSc];
  if(curLn>=sc.lines.length){
    if(curSc+1<SCENES.length)runScene(curSc+1);
    else showEnding();
    return;
  }
  const ln=sc.lines[curLn++];
  if(ln.sj!==undefined)setSJ(ln.sj);
  if(ln.type==='choice'){showChoice(ln);return;}

  // Reset chat UI state
  $('chat-frame').src='data/chat/chat.png';
  $('type-wrap').classList.remove('active');
  $('chat-text').style.display='';
  $('adv-hint').style.display='block';
  $('chat-name').className='';
  const el=$('chat-text');

  if(ln.sty==='narr'){
    $('chat-name').textContent='';
    el.className='narr';
    typeWrite(el,ln.tx,42);
    setWait(()=>{if(ln.eff)applyEff(ln.eff);nextLine();});
  } else if(ln.type==='p'){
    // Quoted line: player must type + Enter
    $('adv-hint').style.display='none';
    $('chat-text').style.display='none';
    startPType(ln.tx,ln.eff);
  } else if(ln.type==='pn'){
    // Non-quoted line: typewriter display, Space to advance
    $('chat-name').textContent='나';
    el.className='';
    typeWrite(el,ln.tx,32);
    setWait(()=>{if(ln.eff)applyEff(ln.eff);nextLine();});
  } else {
    $('chat-name').textContent=ln.sp||'';
    el.className=ln.sp==='사장님'?'boss':'';
    typeWrite(el,ln.tx,32);
    setWait(()=>nextLine());
  }
}

/* ── P TYPING ── */
function startPType(target,eff){
  pTarget=target;pEff=eff||null;
  $('chat-name').textContent='나';
  $('chat-name').className='';
  $('type-hint').textContent=target;
  const inp=$('type-input');
  inp.value='';
  $('type-wrap').classList.add('active');
  setTimeout(()=>inp.focus(),30);
  inp.oncompositionstart=()=>pCompose=true;
  inp.oncompositionend=()=>pCompose=false;
  inp.onkeydown=e=>{
    if(e.key==='Enter'&&!pCompose){
      e.preventDefault();
      if(inp.value.trim().length>=1)confirmPType();
    }
  };
}
function confirmPType(){
  const inp=$('type-input');
  inp.onkeydown=null;inp.oncompositionstart=null;inp.oncompositionend=null;
  $('type-wrap').classList.remove('active');
  $('chat-text').style.display='';
  $('chat-text').className='';
  $('chat-text').textContent=pTarget;
  if(pEff)applyEff(pEff);
  $('adv-hint').style.display='block';
  setWait(()=>nextLine());
}

/* ── CHOICE ── */
function showChoice(ln){
  curChoice=ln;
  $('chat-frame').src='data/chat/choice.png';
  $('type-wrap').classList.remove('active');
  $('chat-text').style.display='none';
  $('chat-name').textContent='';$('chat-name').className='';
  $('adv-hint').style.display='none';
  waiting=false;pend=null;
}
function pickStr(){
  if(!curChoice)return;
  const c=curChoice.str;curChoice=null;
  applyEff(c.eff);
  $('chat-text').style.display='';
  showPLine(c.ptx,()=>{setSJ(c.bsj);showBossLine(c.btx,()=>nextLine());});
}
function pickEnd(){
  if(!curChoice)return;
  const c=curChoice.end;curChoice=null;
  applyEff(c.eff);
  $('chat-text').style.display='';
  showPLine(c.ptx,()=>{setSJ(c.bsj);showBossLine(c.btx,()=>nextLine());});
}
function showPLine(txt,cb){
  $('chat-frame').src='data/chat/chat.png';
  $('chat-name').textContent='나';$('chat-name').className='';
  const el=$('chat-text');el.className='';
  typeWrite(el,txt,32);
  $('adv-hint').style.display='block';
  setWait(cb);
}
function showBossLine(txt,cb){
  $('chat-name').textContent='사장님';$('chat-name').className='';
  const el=$('chat-text');el.className='boss';
  typeWrite(el,txt,32);
  $('adv-hint').style.display='block';
  setWait(cb);
}

/* ── WAIT / ADVANCE ── */
function setWait(fn){waiting=true;pend=fn;}
function advance(){
  if(curChoice)return;
  if(skipTyper($('chat-text')))return;
  if(!waiting)return;
  waiting=false;
  const fn=pend;pend=null;
  if(fn)fn();
}

/* ── ENDINGS: shown through chat UI ── */
const ENDS={
  e1:{bg:'Endling_1',title:'주말 삭제 엔딩',
      text:'하... 고분 고분 대답하느라 너무 지쳤어\n\n어우, 잘잤다. 지금 몇시야?\n어?? 오후 4시? 아씨, 내 휴일!!'},
  e2:{bg:'Endling_2',title:'퇴근 후 맥주 엔딩',
      text:'아, 오늘도 잘 참았다.\n기분 좋게 맥주 하나 때리고 잠이나 자자'},
  e3:{bg:'Endling_3',title:'퇴사 엔딩',
      text:'이딴 거지같은 사장 밑에서는 일 못해.\n최저 주면서 온갖 욕은 다 들어먹네.\n다른 알바나 구하자'}
};
function showEnding(){
  let key;
  if(G.str-(G.mny+G.rpt)/2>30)key='e1';
  else if(G.str<60&&G.mny<60&&G.rpt<60)key='e3';
  else key='e2';
  const E=ENDS[key];
  setBG(E.bg);
  $('status').style.display='none';
  setSJ(null);
  setTimeout(()=>{
    $('chat').style.display='block';
    $('chat-frame').src='data/chat/chat.png';
    $('type-wrap').classList.remove('active');
    $('chat-text').style.display='';
    $('adv-hint').style.display='none';
    $('chat-name').textContent=E.title;
    $('chat-name').className='';
    const el=$('chat-text');el.className='';
    typeWrite(el,E.text,42,()=>{
      $('adv-hint').style.display='block';
      setWait(()=>{
        el.textContent=`월급: ${G.mny}  스트레스: ${G.str}  관계: ${G.rpt}`;
        $('adv-hint').style.display='block';
        setWait(()=>{
          $('adv-hint').style.display='none';
          $('ending').classList.add('show');
        });
      });
    });
  },440);
}

/* ── INPUT ── */
document.addEventListener('keydown',e=>{
  if(e.target.id==='type-input')return;
  if(e.code==='Space'||e.key===' '){
    e.preventDefault();
    if(!curChoice)advance();
    return;
  }
  if((e.key==='p'||e.key==='P')&&curChoice){pickStr();return;}
  if((e.key==='t'||e.key==='T')&&curChoice){pickEnd();return;}
});
document.addEventListener('click',e=>{
  if(e.target.closest('#ending')||e.target.closest('#intro')||e.target.id==='serial-btn')return;
  if(curChoice||e.target.id==='type-input')return;
  advance();
});

/* ── WEB SERIAL ── */
let serialPort=null,serialReader=null,arduinoConnected=false;
async function toggleSerial(){
  if(arduinoConnected){
    try{if(serialReader)await serialReader.cancel();}catch(err){}
    try{if(serialPort)await serialPort.close();}catch(err){}
    serialPort=null;serialReader=null;arduinoConnected=false;
    $('serial-btn').textContent='🔌';$('serial-btn').classList.remove('on');return;
  }
  if(!('serial' in navigator)){alert('Chrome/Edge + 로컬서버 필요');return;}
  try{
    serialPort=await navigator.serial.requestPort();
    await serialPort.open({baudRate:9600});
    arduinoConnected=true;
    $('serial-btn').textContent='✅';$('serial-btn').classList.add('on');
    readSerial();
  }catch(err){if(err.name!=='NotFoundError')alert('연결 실패: '+err.message);}
}
async function readSerial(){
  const dec=new TextDecoderStream();
  serialPort.readable.pipeTo(dec.writable);
  const reader=dec.readable.getReader();serialReader=reader;let buf='';
  try{
    while(true){
      const{value,done}=await reader.read();if(done)break;
      buf+=value;
      const lines=buf.split('\n');buf=lines.pop();
      for(const l of lines){const m=l.trim();if(m)onArduino(m);}
    }
  }catch(err){arduinoConnected=false;$('serial-btn').textContent='🔌';$('serial-btn').classList.remove('on');}
}
function onArduino(msg){
  if(msg==='SHAKE'&&curChoice)pickEnd();
  if((msg==='PIEZO'||msg==='BTN:1')&&curChoice)pickStr();
}
