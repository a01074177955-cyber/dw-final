<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘도 참는다</title>
<style>
:root{
  --ui:rgba(10,8,20,.93);--text:#f0ede8;--muted:#8a8680;
  --gold:#c9a14a;--red:#e2493b;--green:#5b9d7a;--line:rgba(255,255,255,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#000;}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}

/* ── INTRO SCREEN ── */
#intro-screen{
  position:fixed;inset:0;z-index:400;
  background:#000;
  display:flex;align-items:center;justify-content:center;
}
#intro-bg{
  position:absolute;inset:0;
  background:url('data/intro.png') center/cover no-repeat;
  opacity:0;transition:opacity 1.2s ease;
}
#title-img{
  position:absolute;
  width:min(460px,44vw);
  /* center-left, per reference layout */
  left:8%;top:50%;transform:translateY(-50%) scale(1.5);
  opacity:0;pointer-events:none;cursor:pointer;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,.7));
  transition:none;
}
#title-img.bang{
  animation:bang .55s cubic-bezier(.22,.61,.36,1) forwards;
  pointer-events:all;
}
@keyframes bang{
  0%  {transform:translateY(-50%) scale(1.55) rotate(-3deg);opacity:0;}
  45% {transform:translateY(-50%) scale(.93)  rotate(.5deg); opacity:1;}
  75% {transform:translateY(-50%) scale(1.04) rotate(0);     opacity:1;}
  100%{transform:translateY(-50%) scale(1)    rotate(0);     opacity:1;}
}
#str-graph{
  position:absolute;
  width:min(260px,24vw);
  right:6%;bottom:8%;
  opacity:0;
  transform:translateY(20px) scale(.9);
  transition:none;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.6));
  pointer-events:none;
}
#str-graph.appear{
  animation:appear .5s ease forwards;
}
@keyframes appear{
  0%  {opacity:0;transform:translateY(20px) scale(.9);}
  100%{opacity:1;transform:translateY(0)   scale(1); }
}
.intro-click-hint{
  position:absolute;bottom:5%;left:0;right:0;
  text-align:center;font-size:13px;color:rgba(255,255,255,.5);
  letter-spacing:.12em;pointer-events:none;
  animation:bk 1.4s ease infinite;
}
@keyframes bk{0%,100%{opacity:.7;}50%{opacity:.2;}}

/* ── STAT PANEL (top-right, vertical) ── */
#stat-panel{
  position:fixed;top:12px;right:14px;z-index:100;
  display:none;flex-direction:column;align-items:flex-end;gap:6px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:14px;padding:10px 12px;
}
.si{
  display:flex;align-items:center;gap:8px;
}
.si img{width:32px;height:32px;object-fit:contain;image-rendering:pixelated;}
.si .sv{
  font-size:15px;font-weight:800;color:var(--text);
  min-width:28px;text-align:right;font-variant-numeric:tabular-nums;
}
.si .bar-v{
  width:60px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;
}
.si .bar-v-fill{height:100%;border-radius:3px;transition:width .35s ease;}
#sf{background:linear-gradient(90deg,#e7a09d,var(--red));}
#mf{background:linear-gradient(90deg,#b8922c,var(--gold));}
#rf{background:linear-gradient(90deg,#3a7a5a,var(--green));}
#serial-btn{
  margin-top:4px;padding:3px 10px;border-radius:6px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:var(--muted);font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;
}
#serial-btn.on{background:rgba(91,157,122,.2);border-color:#5b9d7a;color:#5b9d7a;}

/* ── SCENE ── */
#bg{
  position:fixed;inset:0;z-index:0;
  background:#000;transition:background .8s ease;
  background-size:cover;background-position:center;background-repeat:no-repeat;
}
#bg-overlay{/* shop-dark darken overlay */
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:rgba(0,0,0,0);transition:background .8s ease;
}
#char-area{
  position:fixed;top:0;left:0;right:0;bottom:220px;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:2;
}
#char{font-size:110px;filter:drop-shadow(0 10px 30px rgba(0,0,0,.6));animation:fl 3.5s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
#char.shake{animation:csh .4s ease !important;}
@keyframes csh{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
#scene-lbl{
  position:fixed;top:10px;left:0;right:0;text-align:center;z-index:3;
  font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,.45);text-transform:uppercase;pointer-events:none;
}

/* ── DIALOGUE ── */
#dlg{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:20px 32px 26px;min-height:190px;
  background:var(--ui);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:none;
}
#dlg-name{font-size:12px;font-weight:700;letter-spacing:.07em;color:var(--gold);margin-bottom:10px;min-height:18px;}
#dlg-text{font-size:16px;line-height:1.78;color:var(--text);min-height:60px;}
#dlg-hint{margin-top:10px;text-align:right;font-size:11px;color:var(--muted);animation:bk 1.3s ease infinite;}

/* ── TYPING CHOICE ZONE ── */
#type-zone{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:var(--ui);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:none;flex-direction:column;
  padding:0 0 4px;
}
.choice-list{display:flex;flex-direction:column;}
.choice-item{
  display:flex;align-items:center;gap:12px;
  padding:15px 32px;border-bottom:1px solid var(--line);
  transition:background .18s, opacity .18s;
  position:relative;
}
.choice-item:last-child{border-bottom:none;}
.c-letter{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--muted);
  font-size:13px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.18s;
}
.c-text{font-size:14.5px;color:rgba(255,255,255,.45);flex:1;transition:color .18s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-tag{font-size:10px;color:var(--muted);background:rgba(255,255,255,.07);padding:2px 8px;border-radius:10px;flex-shrink:0;}
/* States */
.choice-item.active .c-text{color:var(--text);}
.choice-item.active .c-letter{border-color:var(--green);color:var(--green);background:rgba(91,157,122,.12);}
.choice-item.active{background:rgba(91,157,122,.06);}
.choice-item.vent.active .c-letter{border-color:var(--red);color:var(--red);background:rgba(226,73,59,.12);}
.choice-item.vent.active{background:rgba(226,73,59,.06);}
.choice-item.dim{opacity:.35;}
.choice-item.confirmed .c-text{color:var(--green);}
.choice-item.vent.confirmed .c-text{color:var(--red);}

/* typed progress overlay */
.c-progress{
  position:absolute;left:72px;right:80px;font-size:14.5px;color:transparent;pointer-events:none;white-space:nowrap;overflow:hidden;
}
.c-progress .match{color:var(--green);}
.c-progress.vent .match{color:var(--red);}
.c-progress .wrong{color:var(--red);text-decoration:underline;}

.type-input-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 32px 16px;
}
.type-prompt{font-size:16px;color:var(--muted);}
#type-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:inherit;font-size:15px;color:var(--text);
  caret-color:var(--gold);
  border-bottom:1px solid rgba(255,255,255,.2);
  padding:4px 0;
}
#type-input::placeholder{color:var(--muted);font-size:13px;}
#type-hint{font-size:11px;color:var(--muted);white-space:nowrap;padding-left:4px;}

/* ── BOSS MODAL ── */
#boss{
  position:fixed;inset:0;z-index:200;display:none;
  align-items:center;justify-content:center;background:rgba(0,0,0,.3);
}
#boss.show{display:flex;}
.boss-card{
  background:rgba(10,8,20,.97);border:1px solid rgba(226,73,59,.4);border-radius:20px;
  padding:34px 38px;max-width:460px;width:90%;text-align:center;
  animation:bglow 1.2s ease infinite alternate;
}
@keyframes bglow{from{box-shadow:0 0 30px rgba(226,73,59,.2);}to{box-shadow:0 0 70px rgba(226,73,59,.4);}}
.boss-card h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px;}
.boss-card p{font-size:13.5px;color:var(--muted);line-height:1.65;margin-bottom:26px;}
.boss-opts{display:flex;gap:14px;}
.boss-opt{
  flex:1;padding:20px 12px;border-radius:14px;border:2px solid;background:transparent;
  font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:.18s;
}
.boss-opt.p{border-color:var(--red);color:var(--red);}
.boss-opt.p:hover{background:rgba(226,73,59,.15);}
.boss-opt.t{border-color:var(--green);color:var(--green);}
.boss-opt.t:hover{background:rgba(91,157,122,.15);}
.boss-opt .ico{font-size:30px;}
.boss-opt .lbl{font-size:13px;font-weight:700;}
.boss-opt .fx{font-size:11px;opacity:.8;line-height:1.5;}
.boss-hint{margin-top:16px;font-size:11px;color:var(--muted);}
body.boss-mode #bg,body.boss-mode #char,body.boss-mode #bg-overlay{filter:saturate(.12) brightness(.45);transition:filter .5s ease;}
body.boss-mode #dlg,body.boss-mode #type-zone{filter:saturate(.25) brightness(.5);}
.thought{position:fixed;z-index:180;pointer-events:none;font-size:15px;font-weight:700;color:rgba(226,73,59,.85);animation:thf 2.5s ease forwards;text-shadow:0 0 10px rgba(226,73,59,.5);}
@keyframes thf{0%{opacity:0;transform:translateY(10px) rotate(-3deg);}20%{opacity:1;}80%{opacity:.9;}100%{opacity:0;transform:translateY(-30px) rotate(3deg);}}

/* ── GAME OVER ── */
#gameover{
  position:fixed;inset:0;z-index:300;background:linear-gradient(135deg,#1a0505,#0a0000);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;
}
#gameover.show{display:flex;}
.go-ico{font-size:68px;margin-bottom:14px;}
.go-title{font-size:42px;font-weight:900;color:var(--red);margin-bottom:10px;}
.go-quote{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:16px;font-style:italic;}
.go-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:420px;margin-bottom:24px;}
.go-stats{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 28px;min-width:280px;text-align:left;margin-bottom:26px;}

/* ── ENDING ── */
#ending{
  position:fixed;inset:0;z-index:300;
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;
}
#ending.show{display:flex;}
.e-ico{font-size:68px;margin-bottom:14px;}
.e-title{font-size:38px;font-weight:900;color:var(--text);margin-bottom:8px;}
.e-quote{font-size:16px;color:rgba(255,255,255,.65);margin-bottom:14px;font-style:italic;}
.e-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:440px;margin-bottom:24px;}
.e-stats{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:18px 28px;min-width:280px;text-align:left;margin-bottom:24px;}
.s-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.05);}
.s-row:last-child{border:none;font-weight:700;color:var(--text);font-size:15px;padding-top:10px;}
.s-row span+span{color:var(--text);}
.again{padding:12px 30px;border:2px solid rgba(255,255,255,.18);background:transparent;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;transition:.15s;}
.again:hover{background:rgba(255,255,255,.08);}

/* ── MISC ── */
.float{position:fixed;z-index:150;pointer-events:none;font-size:13px;font-weight:700;background:rgba(0,0,0,.75);padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.09);animation:fup 1.3s ease forwards;}
@keyframes fup{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-46px);}}
#fade{position:fixed;inset:0;z-index:500;background:#000;opacity:0;pointer-events:none;transition:opacity .3s ease;}
#fade.in{opacity:1;pointer-events:all;}
</style>
</head>
<body>
<div id="fade"></div>

<!-- INTRO SCREEN -->
<div id="intro-screen">
  <div id="intro-bg"></div>
  <img id="title-img" src="data/title.png" alt="오늘도 참는다" onclick="onTitleClick()">
  <img id="str-graph" src="data/strGraph.png" alt="">
  <div class="intro-click-hint" id="intro-hint" style="display:none">클릭해서 출근하기</div>
</div>

<!-- STAT PANEL (top-right) -->
<div id="stat-panel">
  <div class="si">
    <img src="data/icon/str.png" alt="스트레스">
    <div class="bar-v"><div class="bar-v-fill" id="sf" style="width:50%"></div></div>
    <span class="sv" id="sv">50</span>
  </div>
  <div class="si">
    <img src="data/icon/mny.png" alt="돈">
    <div class="bar-v"><div class="bar-v-fill" id="mf" style="width:50%"></div></div>
    <span class="sv" id="mv">50</span>
  </div>
  <div class="si">
    <img src="data/icon/rpt.png" alt="평판">
    <div class="bar-v"><div class="bar-v-fill" id="rf" style="width:50%"></div></div>
    <span class="sv" id="rv">50</span>
  </div>
  <button id="serial-btn" onclick="toggleSerial()">🔌</button>
</div>

<!-- SCENE -->
<div id="bg"></div>
<div id="bg-overlay"></div>
<div id="scene-lbl"></div>
<div id="char-area"><div id="char"></div></div>

<!-- DIALOGUE -->
<div id="dlg">
  <div id="dlg-name"></div>
  <div id="dlg-text"></div>
  <div id="dlg-hint">▼ 클릭 또는 Space</div>
</div>

<!-- TYPING CHOICE ZONE -->
<div id="type-zone">
  <div class="choice-list" id="choice-list"></div>
  <div class="type-input-row">
    <span class="type-prompt">▶</span>
    <input type="text" id="type-input" autocomplete="off" spellcheck="false" placeholder="마음에 드는 선택지를 타이핑하세요...">
    <span id="type-hint"></span>
  </div>
</div>

<!-- BOSS MODAL -->
<div id="boss">
  <div class="boss-card">
    <h2>💢 한계 돌파</h2>
    <p>속마음이 터지기 직전입니다.<br>어떻게 하시겠습니까?</p>
    <div class="boss-opts">
      <button class="boss-opt p" onclick="bossPick('P')">
        <span class="ico">🤜</span>
        <span class="lbl">피에조 — 화낸다</span>
        <span class="fx">모든 걸 쏟아낸다<br><b>GAME OVER</b></span>
      </button>
      <button class="boss-opt t" onclick="bossPick('T')">
        <span class="ico">😤</span>
        <span class="lbl">기울기 — 참는다</span>
        <span class="fx">스트레스 ↓↓<br>돈/평판 ↑↑</span>
      </button>
    </div>
    <div class="boss-hint" id="boss-hint">P키(화낸다) / T키(참는다) 또는 클릭</div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="go-ico" id="go-ico"></div>
  <div class="go-title" id="go-title"></div>
  <div class="go-quote" id="go-quote"></div>
  <div class="go-sub" id="go-sub"></div>
  <div class="go-stats" id="go-stats"></div>
  <button class="again" onclick="restartGame()">다시 출근하기</button>
</div>

<!-- ENDING -->
<div id="ending">
  <div class="e-ico" id="e-ico"></div>
  <div class="e-title" id="e-title"></div>
  <div class="e-quote" id="e-quote"></div>
  <div class="e-sub" id="e-sub"></div>
  <div class="e-stats" id="e-stats"></div>
  <button class="again" onclick="restartGame()">다시 출근하기</button>
</div>

<script>
/* ═══ SCENES ═══ */
const SCENES=[
  {id:'S0',bg:'bedroom',title:'아침 — 자취방',auto:true,
   dlg:[{sp:null,tx:'삐삐삐삐삐 —',sty:'sys'},{sp:'나',tx:'하.. 또 출근해야 하네..'}]},
  {id:'S1',bg:'shop',title:'패스트푸드점 출근',
   dlg:[{sp:'나',tx:'오늘은 제발 조용했으면 좋겠다...'},{sp:'사장',tx:'왔어? 근데 표정이 왜 그래? 출근하기 싫은 사람 같네.',mood:'neutral'}],
   choices:[
     {tx:'사장님 표정부터 좀 보세요...',resp:{sp:'사장',tx:'뭐라고 했어? 요즘 애들 말투가 왜 그래??',mood:'angry'},eff:{stress:-8,money:-8,rep:-8},type:'A',tag:'화낸다'},
     {tx:'아니에요! 오늘도 열심히 해보겠습니다.',resp:{sp:'사장',tx:'그래, 말이라도 예쁘게 해야지.',mood:'mild'},eff:{stress:8,money:8,rep:8},type:'B',tag:'참는다'}]},
  {id:'S2',bg:'shop',title:'마감 청소 트집',
   dlg:[{sp:'사장',tx:'어제 마감 청소 제대로 안 돼 있더라? 내가 꼼꼼하게 하라고 했지? 바닥 구석도 안 닦았던데?',mood:'neutral'}],
   choices:[
     {tx:'아니 혼자 다 했는데 뭘 더 하라는 거에요?',resp:{sp:'사장',tx:'아니, 변명하려고? 잘못했으면 알겠습니다 해야지.',mood:'angry'},eff:{stress:-8,money:-8,rep:-8},type:'A',tag:'화낸다'},
     {tx:'아 죄송합니다. 제가 확인을 제대로 못한 것 같아요.',resp:{sp:'사장',tx:'알면 됐고.',mood:'mild'},eff:{stress:8,money:8,rep:8},type:'B',tag:'참는다'}]},
  {id:'S3',bg:'shop',title:'폰 사용 트집',
   dlg:[{sp:null,tx:'피크타임이 끝나고 잠깐 한산한 시간...',sty:'narr'},{sp:'사장',tx:'그리고 손님 없다고 앉아서 폰만 하지 말고. 할 거 없으면 눈치껏 뭐라도 찾아서 해야지.',mood:'neutral'}],
   choices:[
     {tx:'할 거 다 했고 손님도 없는데 잠깐 쉬지도 못해요?',resp:{sp:'사장',tx:'태도가 왜 그렇게 삐딱해? 너 계속 그러면 오래 못 간다?',mood:'angry'},eff:{stress:-8,money:-8,rep:-8},type:'A',tag:'화낸다'},
     {tx:'네, 다음부터는 더 신경 쓸게요.',resp:{sp:'사장',tx:'그래. 그렇게 내 가게다~ 생각하고 해야지.',mood:'mild'},eff:{stress:8,money:8,rep:8},type:'B',tag:'참는다'}]},
  {id:'S4',bg:'shop',title:'손님 응대 트집',
   dlg:[{sp:'사장',tx:'아, 그리고 손님 들어오면 인사 좀 밝게 해. 아까 어서오세요 하는데 영혼이 없더라? 이래서야 손님이 오고 싶겠어?',mood:'neutral'}],

/* ═══ HUD ═══ */
const $=id=>document.getElementById(id);
function hud(){
  $('sv').textContent=G.stress;$('sf').style.width=G.stress+'%';
  $('mv').textContent=G.money; $('mf').style.width=G.money+'%';
  $('rv').textContent=G.rep;   $('rf').style.width=G.rep+'%';
}
function applyEff(e){
  if(!e)return;
  G.stress=Math.max(0,Math.min(100,G.stress+(e.stress||0)));
  G.money =Math.max(0,Math.min(100,G.money +(e.money ||0)));
  G.rep   =Math.max(0,Math.min(100,G.rep   +(e.rep   ||0)));
  hud();
}
function showFloat(t,c,pct){
  const el=document.createElement('div');el.className='float';el.textContent=t;
  el.style.color=c;el.style.left='50%';el.style.top=(pct||48)+'%';el.style.transform='translateX(-50%)';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1300);
}
function effFloats(e){
  if(!e)return;
  const r=[];
  if(e.stress)r.push({t:`스트레스 ${e.stress>0?'+':''}${e.stress}`,c:e.stress>0?'#e2493b':'#5b9d7a'});
  if(e.money) r.push({t:`돈 ${e.money>0?'+':''}${e.money}`,c:e.money>0?'#c9a14a':'#888'});
  if(e.rep)   r.push({t:`평판 ${e.rep>0?'+':''}${e.rep}`,c:e.rep>0?'#5b9d7a':'#888'});
  r.forEach((x,i)=>setTimeout(()=>showFloat(x.t,x.c,44+i*7),i*140));
}

/* ═══ TYPEWRITER ═══ */
let typer=null,typerFull='';
function typeWrite(el,txt,spd){
  clearInterval(typer);typerFull=txt;el.textContent='';let i=0;
  typer=setInterval(()=>{el.textContent+=txt[i++];if(i>=txt.length){clearInterval(typer);typer=null;}},spd||28);
}
function skipOrNo(el){
  if(typer){clearInterval(typer);typer=null;el.textContent=typerFull;return true;}
  return false;
}

function runScene(si){
  G.si=si;G.di=0;
  const sc=SCENES[si];
  // Background
  if(sc.bg==='bedroom'){
    $('bg').style.backgroundImage='';
    $('bg').style.background='linear-gradient(140deg,#0a0814 0%,#1e1040 60%,#140c28 100%)';
    $('bg-overlay').style.background='rgba(0,0,0,0)';
  } else {
    $('bg').style.backgroundImage="url('data/Parttime_Bg.png')";
    $('bg').style.background='';
    $('bg-overlay').style.background=sc.bg==='shop-dark'?'rgba(0,0,0,.55)':'rgba(0,0,0,.25)';
  }

  choosing=false;
  if(si>0){const add=G.prevVent?10:5;G.stress=Math.min(100,G.stress+add);hud();}
  nextLine(sc);
}

function nextLine(sc){
  const lines=sc.dlg;
  if(G.di>=lines.length){sc.choices?showChoices(sc):waitFor(()=>advance());return;}
  const ln=lines[G.di++];
  const isSys=ln.sty==='sys',isNarr=ln.sty==='narr';
  if(!ln.sp||isSys||isNarr){
    $('dlg-name').textContent='';$('char').textContent='';
  } else if(ln.sp==='나'){
    $('dlg-name').textContent='나 (속으로)';$('dlg-name').style.color='#888';$('char').textContent='😶';
  } else {
    $('dlg-name').textContent=ln.sp;$('dlg-name').style.color='var(--gold)';
    $('char').textContent=MOODS[ln.mood]||'😐';
    if(ln.mood==='angry'||ln.mood==='rage'||ln.mood==='rant'){$('char').className='shake';setTimeout(()=>$('char').className='',450);}
  }
  const el=$('dlg-text');
  typeWrite(el,ln.tx,isSys?75:28);
  $('dlg-hint').style.display='block';
  waitFor(()=>{if(skipOrNo(el))waitFor(()=>nextLine(sc));else nextLine(sc);});
}
function waitFor(fn){pendingNext=fn;}

/* ═══ TYPING CHOICE ═══ */
let typeSc=null,typeComposing=false;

function showChoices(sc){
  $('dlg-hint').style.display='none';
  $('dlg').style.display='none';
  choosing=true;typeSc=sc;

  const list=$('choice-list');
  list.innerHTML='';
  sc.choices.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='choice-item'+(c.type==='A'?' vent':'');
    d.id='ci'+i;
    d.innerHTML=`<span class="c-letter">${String.fromCharCode(65+i)}</span><span class="c-text" id="ct${i}">${c.tx}</span><span class="c-tag">${c.tag}</span>`;
    list.appendChild(d);
  });

  const inp=$('type-input');
  inp.value='';
  $('type-hint').textContent='';
  $('type-zone').style.display='flex';
  setTimeout(()=>inp.focus(),50);

  inp.oninput=()=>{if(!typeComposing)updateMatch();};
  inp.oncompositionstart=()=>{typeComposing=true;};
  inp.oncompositionend=()=>{typeComposing=false;updateMatch();};
  inp.onkeydown=e=>{
    if((e.code==='Enter'||e.code==='Space')&&!typeComposing){
      const val=inp.value;
      const matched=typeSc.choices.findIndex(c=>c.tx.startsWith(val)&&val.length>0);
      if(matched>=0){e.preventDefault();confirmTyped(matched);}
    }
  };
}

function updateMatch(){
  if(!typeSc)return;
  const val=$('type-input').value;
  const choices=typeSc.choices;

  // Find which choices match the current input (prefix)
  const hits=choices.map((c,i)=>val.length>0&&c.tx.startsWith(val)?i:-1).filter(i=>i>=0);
  const exact=choices.findIndex(c=>c.tx===val);

  choices.forEach((c,i)=>{
    const el=$('ci'+i);
    el.classList.remove('active','dim','confirmed');
    if(val.length===0){/* neutral */}
    else if(hits.includes(i)){el.classList.add('active');}
    else{el.classList.add('dim');}
  });

  if(exact>=0){
    // Auto-confirm on full match
    confirmTyped(exact);return;
  }
  if(hits.length===1){
    $('type-hint').textContent='↵ Enter로 확인';
    $('type-hint').style.color='var(--green)';
  } else if(hits.length===0&&val.length>0){
    $('type-hint').textContent='일치하는 선택지 없음 — 지우고 다시';
    $('type-hint').style.color='var(--red)';
  } else {
    $('type-hint').textContent='계속 타이핑...';
    $('type-hint').style.color='var(--muted)';
  }
}

function confirmTyped(idx){
  const sc=typeSc;typeSc=null;choosing=false;
  const inp=$('type-input');inp.oninput=null;inp.onkeydown=null;inp.oncompositionstart=null;inp.oncompositionend=null;
  $('type-zone').style.display='none';
  $('dlg').style.display='block';
  pick(sc,idx);
}

/* ═══ PICK (choice logic) ═══ */
function pick(sc,i){
  const ch=sc.choices[i];
  if(ch.special==='quit'){showResp(ch.resp,()=>showGameOver('quit'));return;}
  const isVent=ch.type==='A';
  G.prevVent=isVent;
  if(ch.eff)applyEff(ch.eff);
  if(ch.eff)effFloats(ch.eff);
  if(!isVent&&G.stress>=100){showPlayerLine(ch.tx,()=>triggerBoss(ch.resp));return;}
  if(isVent&&(G.money<=0||G.rep<=0)){showResp(ch.resp,()=>showGameOver('broke'));return;}
  showResp(ch.resp,()=>{
    if(G.money<=0||G.rep<=0){showGameOver('broke');return;}
    advance();
  });
}
function showPlayerLine(txt,cb){
  $('dlg-name').textContent='나';$('dlg-name').style.color='#888';$('char').textContent='😶';
  const el=$('dlg-text');typeWrite(el,txt);$('dlg-hint').style.display='block';
  waitFor(()=>{if(skipOrNo(el))waitFor(()=>{pendingNext=null;cb();});else{pendingNext=null;cb();}});
}
function showResp(resp,cb){
  if(!resp){cb();return;}
  $('dlg-name').textContent=resp.sp;$('dlg-name').style.color='var(--gold)';
  $('char').textContent=MOODS[resp.mood]||'😐';
  if(resp.mood==='angry'||resp.mood==='rage'){$('char').className='shake';setTimeout(()=>$('char').className='',450);}
  const el=$('dlg-text');typeWrite(el,resp.tx);$('dlg-hint').style.display='block';
  waitFor(()=>{if(skipOrNo(el))waitFor(()=>{pendingNext=null;cb();});else{pendingNext=null;cb();}});
}
function advance(){
  const next=G.si+1;if(next>=SCENES.length){showEnding();return;}
  const ov=$('fade');ov.classList.add('in');
  setTimeout(()=>{runScene(next);setTimeout(()=>ov.classList.remove('in'),50);},300);
}

function bossPick(type){

  showFloat('😤 하... 오늘만 버티자...','#5b9d7a',32);

function startThoughts(){

/* ═══ WEB SERIAL ═══ */
let serialPort=null,serialReader=null,arduinoConnected=false;
async function toggleSerial(){
  if(arduinoConnected){
    try{if(serialReader)await serialReader.cancel();}catch(e){}
    try{if(serialPort)await serialPort.close();}catch(e){}
    serialPort=null;serialReader=null;arduinoConnected=false;
    $('serial-btn').textContent='🔌';$('serial-btn').classList.remove('on');return;
  }
  if(!('serial' in navigator)){alert('Chrome/Edge + 로컬서버 필요');return;}
  try{
    serialPort=await navigator.serial.requestPort();await serialPort.open({baudRate:9600});
    arduinoConnected=true;$('serial-btn').textContent='✅';$('serial-btn').classList.add('on');readSerial();
  }catch(e){if(e.name!=='NotFoundError')alert('연결 실패: '+e.message);}
}
async function readSerial(){
  const dec=new TextDecoderStream();serialPort.readable.pipeTo(dec.writable);
  const reader=dec.readable.getReader();serialReader=reader;let buf='';
  try{
    while(true){const{value,done}=await reader.read();if(done)break;buf+=value;
      const lines=buf.split('\n');buf=lines.pop();for(const l of lines){const m=l.trim();if(m)onArduino(m);}}
  }catch(e){arduinoConnected=false;$('serial-btn').textContent='🔌';$('serial-btn').classList.remove('on');}
}
function onArduino(msg){
  if(!G)return;
  if($('boss').classList.contains('show')){
    if(msg==='SHAKE')bossPick('T');
    if(msg==='PIEZO'||msg==='BTN:1')bossPick('P');
  }
}
</script>
